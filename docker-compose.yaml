services:
  postgres:
    image: postgres:15-alpine
    container_name: mybackend_db
    environment:
      POSTGRES_DB: mybackend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mybackend"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mybackend_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mybackend_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mybackend.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mybackend_network

volumes:
  postgres_data:

networks:
  mybackend_network:
    driver: bridge
