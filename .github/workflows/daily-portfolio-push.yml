name: Daily portfolio push

# Sends the daily cumulative gain/loss push notification.
# Scheduled at 06:00 UTC (~08:00 Paris in summer / 07:00 in winter).
# GitHub's scheduled runs can be delayed a few minutes under load — acceptable here.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  trigger-push:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend (retry loop to absorb Render cold start)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          URL="https://kellyroussel-backend.onrender.com/cron/daily-portfolio-push"
          for i in $(seq 1 16); do
            echo "Attempt $i..."
            code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" --max-time 120 \
              -X POST -H "X-Cron-Secret: ${CRON_SECRET}" "$URL" || echo "000")
            echo "HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Success: $(cat /tmp/resp.txt)"
              exit 0
            fi
            echo "Not ready (likely cold start), retrying in 30s..."
            sleep 30
          done
          echo "Failed after retries"
          exit 1
